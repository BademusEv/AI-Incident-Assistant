server:
  port: ${PORT:8080}

spring:
  application:
    name: ai-incident-assistant
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-mini}
          temperature: 0
          max-tokens: ${OPENAI_MAX_TOKENS:900}

incident-assistant:
  retry:
    max-attempts: 2
    initial-delay-ms: 500
